# Auto-generated compact active config. Source: configs/stage0_1_stabilized_ppo.yaml
# Historical variants are intentionally omitted from this file; use the source config for audits/reruns.

experiment:
  name: stage0_1_active_r_pipeline
  status: active
  purpose: Compact active config for current R-line work. Keeps only R3/R6c/R7 and the required inheritance chain plus one
    flat baseline. Historical E/R variants remain in stage0_1_stabilized_ppo.yaml.
data:
  feature_set: stage0_1_weight_features
  model_ready_csv: artifacts/stage0_1/features/stage0_1_weight_features_model_ready.csv
  raw_features_csv: artifacts/stage0_1/features/stage0_1_weight_features_raw.csv
  transform_stats_csv: artifacts/stage0_1/features/stage0_1_weight_feature_transform_stats.csv
  train_start: '2010-01-04'
  validation_end: '2021-12-31'
  frozen_test_start: '2022-01-03'
  frozen_test_end: '2023-02-28'
normalization:
  enabled: true
  fit_scope: fold_train_only
  lower_quantile: 0.01
  upper_quantile: 0.99
walk_forward:
  folds_csv: configs/stage0_1_walk_forward_folds.csv
  fold_ids:
  - fold_2018
  - fold_2019
  - fold_2020
  - fold_2021
  selection_score: mean_validation_sharpe_minus_0_5_std_sharpe
output:
  root_dir: artifacts/stage0_1
  run_name: weight_based_initial_grid
  skip_completed: true
instrumentation:
  save_sample_diagnostics: true
  save_rollout_snapshots: true
  rollout_snapshot_every_n_updates: 1
universe:
  cash_symbol: CASH
  sector_map: dow30_static
environment:
  initial_amount: 1000000.0
  transaction_cost_pct: 0.001
  reward_scale: 100.0
  reward:
    return_weight: 1.0
    turnover_penalty: 0.02
    drawdown_penalty: 0.1
    concentration_penalty: 0.001
    action_change_penalty: 0.01
  observation:
    include_features: true
    include_previous_weights: true
    include_portfolio_state: true
  execution:
    turnover_cap: 0.35
    integral_clip: 0.5
    derivative_clip: 0.5
policy:
  net_arch:
    pi:
    - 128
    - 64
    vf:
    - 256
    - 128
  activation: ReLU
  ortho_init: true
  dirichlet:
    alpha_min: 1.0
    alpha_max: 80.0
  root_split:
    q_min: 0.0
    q_max: 0.995
    alpha_floor: 0.05
    kappa_min: 2.0
    kappa_max: 80.0
    risky_alpha_max: 100.0
  learned_kp:
    gate_kappa_min: 8.0
    gate_kappa_max: 80.0
  dirtree:
    group_alpha_max: 100.0
    leaf_alpha_max: 120.0
  logitnormal:
    group_log_std_min: -2.5
    group_log_std_max: 0.3
  routed:
    root_latent_dim: 32
    risky_latent_dim: 32
    hidden_dim: 128
    root_feature_names:
    - VIX
    - VIX_change_1d
    - VIX_percentile_252
    - 10Y_Yield
    - yield_change_1d
    - yield_change_5d
    - Regime_1_Prob
    - Regime_1_Prob_delta_1d
    - regime_entropy
    - SP500_Trend
    - SP500_Trend_delta_1d
    - turbulence
    - turbulence_delta_1d
    - turbulence_percentile_252
    - universe_return_1d
    - universe_return_5d
    - universe_return_20d
    - universe_vol_20d
feature_subsets:
  compact22_stage0_like:
  - Regime_1_Prob
  - SP500_Trend
  - turbulence
  - 10Y_Yield
  - VIX
  - atr_rel
  - logret_1d
  - logret_5d
  - realized_vol_20d
  - drawdown_20d
  - macd
  - rsi_30
  - cci_30
  - dx_30
  - volume_ratio
  - obv_pct_change
  - PE_ratio
  - PB_ratio
  - dividend_yield
  - debt_ratio
  - revenue_growth
  - EV_EBITDA
ppo:
  total_timesteps: 350000
  n_steps: 1024
  batch_size: 256
  n_epochs: 4
  learning_rate: 0.0001
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.1
  ent_coef: 0.0001
  vf_coef: 0.5
  max_grad_norm: 0.3
  target_kl: 0.01
  seed: 42
